name: CI
on: push
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.3'
        modules: 'qtmultimedia qtpdf'
    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get install -y libgl1-mesa-dev cmake
        git clone https://github.com/taglib/taglib.git
        cd taglib
        cmake -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_SHARED_LIBS=ON .
        make -j$(nproc)
        sudo make install
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install taglib pkg-config
        echo "PKG_CONFIG_PATH=$(brew --prefix taglib)/lib/pkgconfig" >> $GITHUB_ENV
    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: vcpkg install taglib:x64-windows
    - uses: ilammy/msvc-dev-cmd@v1
      if: matrix.os == 'windows-latest'
    - name: Build (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        qmake M3Player.pro
        make -j$(nproc)
    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        qmake M3Player.pro -spec win32-msvc
        nmake
    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        export PKG_CONFIG_PATH=$(brew --prefix taglib)/lib/pkgconfig
        qmake M3Player.pro
        make -j$(nproc)